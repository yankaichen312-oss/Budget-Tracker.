<!DOCTYPE html>
<html>
<head>
<title>Budget Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>💰 Budget Tracker</h1>

<div class="balance-box">
<h2>Balance</h2>
<h3 id="balance">$0</h3>
</div>

<div class="summary">
<div class="income">
<h3>Income</h3>
<p id="income">$0</p>
</div>

<div class="expense">
<h3>Expense</h3>
<p id="expense">$0</p>
</div>
</div>

<h2>Add Transaction</h2>

<input id="text" placeholder="Description">
<input id="amount" placeholder="Amount">
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<button onclick="addTransaction()">Add</button>

<h2>History</h2>
<ul id="list"></ul>

<h2>Summary Chart</h2>
<div class="chart">
<div id="incomeBar"></div>
<div id="expenseBar"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
